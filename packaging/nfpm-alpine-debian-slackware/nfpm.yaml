name: ${MODNAME}-dkms
version: "${VERSION}"
release: "${RELEASE}"
arch: "amd64"
platform: "linux"
maintainer: "MSI-EC developpers"

contents:
  - src: "../../Makefile"
    dst: "/usr/src/msi-ec-${VERSION}/Makefile"
  - src: "../../Makefile.vars"
    dst: "/usr/src/msi-ec-${VERSION}/Makefile.vars"
  - src: "../../msi-ec.c"
    dst: "/usr/src/msi-ec-${VERSION}/msi-ec.c"
  - src: "../../ec_memory_configuration.h"
    dst: "/usr/src/msi-ec-${VERSION}/ec_memory_configuration.h"
  - src: "../../dkms.conf"
    dst: "/usr/src/msi-ec-${VERSION}/dkms.conf"
  - src: "../../LICENSE"
    dst: "/usr/src/msi-ec-${VERSION}/LICENSE"
  - src: "../../README.md"
    dst: "/usr/src/msi-ec-${VERSION}/README.md"
  - src: "../../universalDKMSModuleUninstaller.sh"
    dst: "/usr/src/msi-ec-${VERSION}/universalDKMSModuleUninstaller.sh"
  - src: "../../docs"
    dst: "/usr/src/msi-ec-${VERSION}/docs"

scripts:
  postinstall: "scripts/postinstall.sh"
  preremove: "scripts/preremove.sh"

overrides:
  deb:
    depends: [dkms, make, gcc, linux-headers-generic]
  apk:
    depends: [dkms, make, gcc, linux-lts-dev]
  
  # Using the archlinux preset for slackware as they are really close and there is no official slackware support
  archlinux:
    scripts:
      postinstall: "scripts/postinstall_slackware.sh"
